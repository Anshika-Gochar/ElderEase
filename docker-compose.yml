version: "3.9"

services:
  # ─── AI Service (Python FastAPI) ───
  ai-service:
    build:
      context: ./ai-service
    container_name: elderease-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - elderease-network

  # ─── Backend (Node.js) ───
  backend:
    build:
      context: ./backend
    container_name: elderease-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "--input-type=module", "-e", "import http from 'http'; http.get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - elderease-network

  # ─── Client Elder (React + Vite) ───
  client-elder:
    build:
      context: ./apps/client-elder
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: elderease-client-elder
    # nginx serves on :80 inside container
    # mapped to 5173 on host for local Docker testing only
    # production uses Vercel (these containers not deployed)
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - elderease-network

  # ─── Client Caregiver (React + Vite) ───
  client-caregiver:
    build:
      context: ./apps/client-caregiver
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: elderease-client-caregiver
    # nginx serves on :80 inside container
    # mapped to 5174 on host for local Docker testing only
    # production uses Vercel (these containers not deployed)
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - elderease-network

networks:
  elderease-network:
    driver: bridge
